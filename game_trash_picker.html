<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Trash Picker Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    #startScreen, #replayButton {
      width: 360px;
      height: 640px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      flex-direction: column;
      gap: 20px;
    }
    #startScreen {
      background: #ffffff;
    }
    #replayButton {
      background: rgba(0,0,0,0.6);
      color: #fff;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }
    #nameInput {
      font-size: 20px;
      padding: 10px;
      width: 250px;
      text-align: center;
    }
    #gameCanvas {
      display: none;
      background: #ffffff;
    }
  </style>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // Firebase 設定
    var firebaseConfig = {
      apiKey: "AIzaSyDKUEGCdlnIIS_1nmMpEzqZ3bc9icLd2aE",
      authDomain: "wix-game-score.firebaseapp.com",
      projectId: "wix-game-score",
      storageBucket: "wix-game-score.firebasestorage.app",
      messagingSenderId: "207767590781",
      appId: "1:207767590781:web:8e435affd2a4d82f4b9e14"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveScoreToFirebase(score, name) {
      await db.collection("scores").add({
        name: name,
        score: score,
        date: new Date()
      });
    }
  </script>

</head>

<body>

  <div id="startScreen">
    ▶ PLAY
    <input id="nameInput" placeholder="名前を入力（任意）" />
  </div>

  <div id="replayButton">↻ REPLAY</div>

  <canvas id="gameCanvas" width="360" height="640"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const replayButton = document.getElementById("replayButton");
    const nameInput = document.getElementById("nameInput");

    startScreen.addEventListener("click", () => {
      startScreen.style.display = "none";
      canvas.style.display = "block";
      startGame();
    });

    replayButton.addEventListener("click", () => {
      replayButton.style.display = "none";
      startGame();
    });

    let player, garbage, enemies, poops, score, gameOver, difficulty;
    const gravity = 0.6;
    let keys = {};

    // ゴミ7種（高得点ほどレア）
    const garbageTypes = [
      { color: "green",  score: 10,  weight: 50 },
      { color: "yellow", score: 20,  weight: 30 },
      { color: "orange", score: 40,  weight: 15 },
      { color: "red",    score: 80,  weight: 8  },
      { color: "purple", score: 160, weight: 4  },
      { color: "blue",   score: 320, weight: 2  },
      { color: "gold",   score: 720, weight: 1  }
    ];

    // 敵4種
    const enemyTypes = {
      normal: { w: 40, h: 40, speed: 6 },
      tall:   { w: 40, h: 80, speed: 6 },
      jumper: { w: 40, h: 40, speed: 6, jumpPower: -10 },
      flyer:  { w: 40, h: 40, speed: 4, flyHeight: 250 }
    };

    function initGame() {
      player = { x: 50, y: 500, w: 40, h: 40, vy: 0, onGround: true };
      garbage = [];
      enemies = [];
      poops = [];
      score = 0;
      gameOver = false;
      difficulty = 1;
    }

    function startGame() {
      initGame();
      update();
      scheduleEnemySpawn();
      scheduleGarbageSpawn();
    }

    document.addEventListener("keydown", (e) => keys[e.key] = true);
    document.addEventListener("keyup", (e) => keys[e.key] = false);

    // 難易度更新（1〜7）
    function updateDifficulty() {
      if (score > 6000) difficulty = 7;
      else if (score > 4000) difficulty = 6;
      else if (score > 2500) difficulty = 5;
      else if (score > 1500) difficulty = 4;
      else if (score > 800) difficulty = 3;
      else if (score > 300) difficulty = 2;
      else difficulty = 1;
    }

    // 難易度に応じて出現可能なゴミ
    function getAvailableGarbageTypes() {
      return garbageTypes.slice(0, difficulty);
    }

    // 重み付きランダム選択
    function chooseWeightedGarbage() {
      const available = getAvailableGarbageTypes();
      const totalWeight = available.reduce((sum, g) => sum + g.weight, 0);
      let r = Math.random() * totalWeight;
      for (const g of available) {
        if (r < g.weight) return g;
        r -= g.weight;
      }
      return available[0];
    }

    function spawnGarbage() {
      if (gameOver) return;
      const type = chooseWeightedGarbage();
      garbage.push({
        x: 360,
        y: 520,
        w: 30,
        h: 30,
        color: type.color,
        score: type.score
      });
    }

    // 難易度に応じて出現可能な敵
    function getAvailableEnemyTypes() {
      if (difficulty <= 1) return ["normal"];
      if (difficulty == 2) return ["normal", "tall"];
      if (difficulty == 3) return ["normal", "tall"];
      if (difficulty == 4) return ["normal", "tall", "jumper"];
      return ["normal", "tall", "jumper", "flyer"]; // Lv5〜7
    }

    function spawnEnemy() {
      if (gameOver) return;
      const available = getAvailableEnemyTypes();
      const type = available[Math.floor(Math.random() * available.length)];
      const e = enemyTypes[type];

      enemies.push({
        type,
        x: 360,
        y: type === "flyer" ? e.flyHeight : 520 - e.h,
        w: e.w,
        h: e.h,
        speed: e.speed,
        vy: 0,
        jumpPower: e.jumpPower || 0,
        poopTimer: 0
      });
    }

    function getEnemySpawnInterval() {
      return 2000 - (difficulty - 1) * 200; // 2000→800ms
    }

    function scheduleEnemySpawn() {
      if (gameOver) return;
      spawnEnemy();
      setTimeout(scheduleEnemySpawn, getEnemySpawnInterval());
    }

    function scheduleGarbageSpawn() {
      if (gameOver) return;
      spawnGarbage();
      const interval = 1500 - (difficulty - 1) * 100; // 少し速く
      setTimeout(scheduleGarbageSpawn, Math.max(500, interval));
    }

    function updateFlyer(enemy) {
      enemy.x -= enemy.speed;
      enemy.poopTimer++;
      if (enemy.poopTimer > 60) {
        enemy.poopTimer = 0;
        poops.push({
          x: enemy.x + enemy.w / 2,
          y: enemy.y + enemy.h,
          w: 20,
          h: 20,
          vy: 5
        });
      }
    }

    function updatePoops() {
      poops.forEach(p => p.y += p.vy);
      poops = poops.filter(p => p.y < 640);
    }

    function updateEnemies() {
      enemies.forEach(e => {
        if (e.type === "jumper") {
          if (Math.random() < 0.02) e.vy = e.jumpPower;
          e.vy += gravity;
          e.y += e.vy;
          if (e.y > 520 - e.h) {
            e.y = 520 - e.h;
            e.vy = 0;
          }
        } else if (e.type === "flyer") {
          updateFlyer(e);
        } else {
          e.x -= e.speed;
        }
      });
      enemies = enemies.filter(e => e.x > -100);
    }

    function isColliding(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function update() {
      if (gameOver) return;

      updateDifficulty();

      if (keys["ArrowLeft"]) player.x -= 4;
      if (keys["ArrowRight"]) player.x += 4;

      if (keys[" "] && player.onGround) {
        player.vy = -12;
        player.onGround = false;
      }

      player.vy += gravity;
      player.y += player.vy;

      if (player.y > 500) {
        player.y = 500;
        player.vy = 0;
        player.onGround = true;
      }

      garbage.forEach(g => g.x -= 4);
      garbage = garbage.filter(g => g.x > -50);

      updateEnemies();
      updatePoops();

      garbage.forEach((g, i) => {
        if (isColliding(player, g)) {
          score += g.score;
          garbage.splice(i, 1);
        }
      });

      enemies.forEach(e => {
        if (isColliding(player, e)) endGame();
      });

      poops.forEach(p => {
        if (isColliding(player, p)) endGame();
      });

      score += 0.1;

      draw();
      requestAnimationFrame(update);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // プレイヤー
      ctx.fillStyle = "blue";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      // ゴミ
      garbage.forEach(g => {
        ctx.fillStyle = g.color;
        ctx.fillRect(g.x, g.y, g.w, g.h);
      });

      // 敵
      enemies.forEach(e => {
        ctx.fillStyle = "red";
        ctx.fillRect(e.x, e.y, e.w, e.h);
      });

      // ウンチ
      ctx.fillStyle = "brown";
      poops.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

      // UI
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      ctx.fillText("Score: " + Math.floor(score), 10, 30);
      ctx.fillText("Lv: " + difficulty, 280, 30);
    }

    async function endGame() {
      gameOver = true;

      const finalScore = Math.floor(score);
      const playerName = nameInput.value.trim() || "名無し";

      await saveScoreToFirebase(finalScore, playerName);

      // Wix 親ページへ通知（ランキング更新用）
      window.parent.postMessage({ type: "GAME_OVER" }, "*");

      replayButton.style.display = "flex";
    }
  </script>

</body>
</html>
