<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Wix Game External Version</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #f0f0f0;
      }
      #startScreen, #replayButton {
        width: 360px;
        height: 640px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
      }
      #startScreen {
        background: #ffffff;
      }
      #replayButton {
        background: rgba(0,0,0,0.6);
        color: #fff;
        position: absolute;
        top: 0;
        left: 0;
        display: none;
      }
      #gameCanvas {
        display: none;
        background: #ffffff;
      }
    </style>
  </head>

  <body>

    <div id="startScreen">▶ PLAY</div>
    <div id="replayButton">↻ REPLAY</div>
    <canvas id="gameCanvas" width="360" height="640"></canvas>

    <!-- ★★★ Firebase + ゲーム本体（完全版） ★★★ -->
    <script type="module">

      /* ---------------------------------------------------------
         Firebase 初期化
      --------------------------------------------------------- */
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { 
        getFirestore, 
        collection, 
        addDoc 
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDKUEGCdlnIIS_1nmMpEzqZ3bc9icLd2aE",
        authDomain: "wix-game-score.firebaseapp.com",
        projectId: "wix-game-score",
        storageBucket: "wix-game-score.firebasestorage.app",
        messagingSenderId: "207767590781",
        appId: "1:207767590781:web:8e435affd2a4d82f4b9e14"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function saveScoreToFirebase(score, name = "名無し") {
        try {
          await addDoc(collection(db, "scores"), {
            name: name,
            score: score,
            date: new Date()
          });
          console.log("スコア保存成功:", score);
        } catch (e) {
          console.error("スコア保存失敗:", e);
        }
      }


      /* ---------------------------------------------------------
         ゲーム本体
      --------------------------------------------------------- */

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const startScreen = document.getElementById("startScreen");
      const replayButton = document.getElementById("replayButton");

      startScreen.addEventListener("click", () => {
        startScreen.style.display = "none";
        canvas.style.display = "block";
        startGame();
      });

      replayButton.addEventListener("click", () => {
        replayButton.style.display = "none";
        startGame();
      });

      let player, garbage, obstacles, score, gameOver;
      const gravity = 0.6;
      let keys = {};

      function initGame() {
        player = { x: 50, y: 500, w: 40, h: 40, vy: 0, onGround: true };
        garbage = [];
        obstacles = [];
        score = 0;
        gameOver = false;
      }

      function startGame() {
        initGame();
        update();
      }

      document.addEventListener("keydown", (e) => keys[e.key] = true);
      document.addEventListener("keyup", (e) => keys[e.key] = false);

      function spawnGarbage() {
        if (gameOver) return;
        garbage.push({ x: 360, y: 520, w: 30, h: 30 });
      }

      function spawnObstacle() {
        if (gameOver) return;
        obstacles.push({ x: 360, y: 520, w: 40, h: 40 });
      }

      function isColliding(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function update() {
        if (gameOver) return;

        if (keys["ArrowLeft"]) player.x -= 4;
        if (keys["ArrowRight"]) player.x += 4;

        if (keys[" "] && player.onGround) {
          player.vy = -12;
          player.onGround = false;
        }

        player.vy += gravity;
        player.y += player.vy;

        if (player.y > 500) {
          player.y = 500;
          player.vy = 0;
          player.onGround = true;
        }

        garbage.forEach(g => g.x -= 4);
        garbage = garbage.filter(g => g.x > -50);

        obstacles.forEach(o => o.x -= 6);
        obstacles = obstacles.filter(o => o.x > -50);

        garbage.forEach((g, i) => {
          if (isColliding(player, g)) {
            score += 10;
            garbage.splice(i, 1);
          }
        });

        obstacles.forEach(o => {
          if (isColliding(player, o)) {
            endGame();
          }
        });

        score += 0.1;

        draw();
        requestAnimationFrame(update);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "blue";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        ctx.fillStyle = "green";
        garbage.forEach(g => ctx.fillRect(g.x, g.y, g.w, g.h));

        ctx.fillStyle = "red";
        obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        ctx.fillStyle = "black";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + Math.floor(score), 10, 30);
      }

      async function endGame() {
        gameOver = true;

        const finalScore = Math.floor(score);

        // ★ Firebase にスコア保存
        await saveScoreToFirebase(finalScore, "名無し");

        alert("スコアを保存しました！");

        replayButton.style.display = "flex";
      }

      setInterval(spawnGarbage, 1500);
      setInterval(spawnObstacle, 2000);

    </script>

  </body>
</html>
