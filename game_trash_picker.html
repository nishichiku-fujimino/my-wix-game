<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Trash Picker Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    #gameContainer {
      position: relative;
      width: 360px;
      height: 640px;
      margin: 0 auto;
    }

    #startScreen, #replayButton {
      width: 360px;
      height: 640px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      flex-direction: column;
      gap: 20px;
      position: absolute;
      top: 0;
      left: 0;
    }

    #startScreen {
      background: #ffffff;
      z-index: 10;
    }

    #replayButton {
      background: rgba(0,0,0,0.6);
      color: #fff;
      display: none;
      z-index: 9999;
    }

    #nameInput {
      font-size: 20px;
      padding: 10px;
      width: 250px;
      text-align: center;
    }

    #gameCanvas {
      background: #ffffff;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
  </style>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDKUEGCdlnIIS_1nmMpEzqZ3bc9icLd2aE",
      authDomain: "wix-game-score.firebaseapp.com",
      projectId: "wix-game-score",
      storageBucket: "wix-game-score.firebasestorage.app",
      messagingSenderId: "207767590781",
      appId: "1:207767590781:web:8e435affd2a4d82f4b9e14"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveScoreToFirebase(score, name) {
      await db.collection("scores").add({
        name: name,
        score: score,
        date: new Date()
      });
    }

    async function cleanupTop10() {
      const snapshot = await db.collection("scores")
        .orderBy("score", "desc")
        .get();
    
      const docs = snapshot.docs;
    
      for (let i = 10; i < docs.length; i++) {
        const id = docs[i].id;
    
        try {
          await db.collection("scores").doc(id).delete();
          console.log("Deleted:", id);
        } catch (e) {
          console.error("Delete failed:", id, e);
        }
      }
    }
  </script>
</head>

<body>

  <div id="gameContainer">

    <div id="startScreen">
      ▶ PLAY
      <input id="nameInput" placeholder="名前を入力（任意）" />
    </div>

    <canvas id="gameCanvas" width="360" height="640"></canvas>

    <div id="replayButton">↻ REPLAY</div>

  </div>

  <script>
  const VERSION = "v1.2.6";
  const GROUND_BOTTOM = 540;

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const startScreen = document.getElementById("startScreen");
  const replayButton = document.getElementById("replayButton");
  const nameInput = document.getElementById("nameInput");
  let enemySpawnTimerId = null;
  let garbageSpawnTimerId = null;

  // ★ 名前入力欄をタップしたときはゲーム開始を阻止
  nameInput.addEventListener("click", (e) => {
    e.stopPropagation();
  });
  
  startScreen.addEventListener("click", () => {
    startScreen.style.display = "none";
    startGame();
  });

  replayButton.addEventListener("click", () => {
    replayButton.style.display = "none";
    startGame();
  });

  let player, garbage, enemies, poops, score, gameOver, difficulty;
  const gravity = 0.6;
  let keys = {};
  let jumpKeyPressed = false;

  const garbageTypes = [
    { color: "green",  score: 10,  weight: 40 },
    { color: "yellow", score: 20,  weight: 25 },
    { color: "orange", score: 40,  weight: 15 },
    { color: "red",    score: 80,  weight: 10 },
    { color: "purple", score: 160, weight: 6  },
    { color: "blue",   score: 320, weight: 3  },
    { color: "gold",   score: 720, weight: 1  }
  ];

  const enemyTypes = {
    normal: { w: 40, h: 40, speed: 5 },
    tall:   { w: 40, h: 60, speed: 4 },
    jumper: { w: 40, h: 40, speed: 2, jumpPower: -8 },
    flyer:  { w: 40, h: 40, speed: 3, flyHeight: 150 }
  };

  function initGame() {
    player = { 
      x: 50, 
      y: GROUND_BOTTOM - 40,
      w: 40, 
      h: 40, 
      vy: 0, 
      onGround: true,
      jumpCount: 0
    };
    garbage = [];
    enemies = [];
    poops = [];
    score = 0;
    gameOver = false;
    difficulty = 1;
  }

  function startGame() {
    initGame();
    scheduleEnemySpawn(true);
    scheduleGarbageSpawn(true);
    update();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === " ") {
      if (!jumpKeyPressed) {
        if (player.jumpCount < 2) {
          player.vy = player.jumpCount === 0 ? -12 : -10;
          player.onGround = false;
          player.jumpCount++;
        }
      }
      jumpKeyPressed = true;
    }
    keys[e.key] = true;
  });

  document.addEventListener("keyup", (e) => {
    if (e.key === " ") jumpKeyPressed = false;
    keys[e.key] = false;
  });

  function updateDifficulty() {
    if (score > 6000) difficulty = 7;
    else if (score > 4000) difficulty = 6;
    else if (score > 2500) difficulty = 5;
    else if (score > 1500) difficulty = 4;
    else if (score > 800) difficulty = 3;
    else if (score > 300) difficulty = 2;
    else difficulty = 1;
  }

  function getAvailableGarbageTypes() {
    return garbageTypes.slice(0, difficulty);
  }

  function chooseWeightedGarbage() {
    const available = getAvailableGarbageTypes();
    const totalWeight = available.reduce((sum, g) => sum + g.weight, 0);
    let r = Math.random() * totalWeight;

    for (const g of available) {
      if (r < g.weight) return g;
      r -= g.weight;
    }
    return available[0];
  }

  function spawnGarbage() {
    if (gameOver) return;
    const type = chooseWeightedGarbage();
    garbage.push({
      x: 360,
      y: GROUND_BOTTOM - 30,
      w: 30,
      h: 30,
      color: type.color,
      score: type.score
    });
  }

  function chooseEnemyType() {
    const r = Math.random();
  
    // ★ Level1〜2：地上敵のみ（jumper も flyer も出ない）
    if (difficulty <= 2) {
      return Math.random() < 0.7 ? "normal" : "tall";
    }
  
    // ★ Level3：jumper 解禁、flyer はまだ出ない
    if (difficulty === 3) {
      const gr = Math.random();
      if (gr < 0.7) return "normal";
      if (gr < 0.9) return "tall";
      return "jumper";  // ★ Level3 から出現
    }
  
    // ★ Level4：flyer 解禁（15%）
    if (difficulty === 4) {
      if (r < 0.15) return "flyer";  // ★ Level4 から出現
  
      const gr = Math.random();
      if (gr < 0.6) return "normal";
      if (gr < 0.85) return "tall";
      return "jumper";
    }
  
    // ★ Level5：normal 50 / tall 30 / jumper 20（flyer 15%）
    if (difficulty === 5) {
      if (r < 0.15) return "flyer";
  
      const gr = Math.random();
      if (gr < 0.50) return "normal";
      if (gr < 0.80) return "tall";
      return "jumper";
    }
  
    // ★ Level6：normal 40 / tall 30 / jumper 30（flyer 15%）
    if (difficulty === 6) {
      if (r < 0.15) return "flyer";
  
      const gr = Math.random();
      if (gr < 0.40) return "normal";
      if (gr < 0.70) return "tall";
      return "jumper";
    }
  
    // ★ Level7：normal = tall = jumper = 均等（flyer 15%）
    if (difficulty >= 7) {
      if (r < 0.15) return "flyer";
  
      const gr = Math.random();
      if (gr < 1/3) return "normal";
      if (gr < 2/3) return "tall";
      return "jumper";
    }
  }



  // ★ flyer は常に低速、地上敵のみ難易度で加速
  function getEnemySpeed(type, baseSpeed) {
    if (type === "flyer") {
      return 2.0;  // Flyer は固定で遅め
    }
    if (type === "jumper") {
      return baseSpeed + difficulty * 0.25;  // ★ 他の地上敵の半分
    }
    return baseSpeed + difficulty * 0.5;  // normal / tall
  }

  // 地上敵2体 + 空中敵1体 同時出現可能
  function spawnEnemy() {
    if (gameOver) return;
  
    // 現在の敵数を確認
    const groundEnemies = enemies.filter(e => e.type !== "flyer").length;
    const flyerEnemies  = enemies.filter(e => e.type === "flyer").length;
  
    // 敵タイプを決定
    const type = chooseEnemyType();
    const e = enemyTypes[type];
  
    // ★ 地上敵は2体まで許可（緩和済み）
    if (type !== "flyer" && groundEnemies >= 2) return;
  
    // ★ flyer は1体まで
    if (type === "flyer" && flyerEnemies >= 1) return;
  
    // 基本の Y 座標
    let enemyY = (type === "flyer")
      ? e.flyHeight
      : GROUND_BOTTOM - e.h;
  
    // ★ Jumper の出現位置をランダムにオフセット（-40〜+40px）
    if (type === "jumper") {
      const offset = (Math.random() * 80) - 40; // -40〜+40
      enemyY = GROUND_BOTTOM - e.h + offset;
  
      // 地面より下に行かないよう補正
      if (enemyY > GROUND_BOTTOM - e.h) {
        enemyY = GROUND_BOTTOM - e.h;
      }
  
      // 高すぎると tall より上に行きすぎるので上限を設定（40px 上まで）
      const maxJumpStart = GROUND_BOTTOM - e.h - 40;
      if (enemyY < maxJumpStart) {
        enemyY = maxJumpStart;
      }
    }
  
    // 敵を追加
    enemies.push({
      type,
      x: 360 + (type === "jumper" ? 10 : 0),  // ★ Jumper は安全マージンで右にずらす
      y: enemyY,
      w: e.w,
      h: e.h,
      speed: getEnemySpeed(type, e.speed),
      vy: 0,
      jumpPower: e.jumpPower || 0,
      poopTimer: 0,
      jumpDistance: 0  // ★ 着地後の距離カウント用
    });
  }



  function getEnemySpawnInterval() {
    return Math.max(600, 2000 - (difficulty - 1) * 200);
  }

  function scheduleEnemySpawn(reset = false) {
    if (reset && enemySpawnTimerId !== null) {
      clearTimeout(enemySpawnTimerId);
      enemySpawnTimerId = null;
    }
  
    if (gameOver) return;
  
    spawnEnemy();
  
    enemySpawnTimerId = setTimeout(() => {
      scheduleEnemySpawn(false);
    }, getEnemySpawnInterval());
  }

  function scheduleGarbageSpawn(reset = false) {
    if (reset && garbageSpawnTimerId !== null) {
      clearTimeout(garbageSpawnTimerId);
      garbageSpawnTimerId = null;
    }
  
    if (gameOver) return;
  
    spawnGarbage();
  
    const interval = Math.max(400, 1500 - (difficulty - 1) * 120);
    garbageSpawnTimerId = setTimeout(() => {
      scheduleGarbageSpawn(false);
    }, interval);
  }


  function updateFlyer(enemy) {
    enemy.x -= enemy.speed;
  
    // ★ ランダム間隔でウンチを落とす
    if (!enemy.nextPoop) {
      enemy.nextPoop = 40 + Math.floor(Math.random() * 50); 
    }
  
    enemy.poopTimer++;
  
    if (enemy.poopTimer >= enemy.nextPoop) {
      enemy.poopTimer = 0;
      enemy.nextPoop = 40 + Math.floor(Math.random() * 50); // ★ 次の間隔もランダム
  
      poops.push({
        x: enemy.x + enemy.w / 2,
        y: enemy.y + enemy.h,
        w: 20,
        h: 20,
        vy: 5
      });
    }
  }

  function updatePoops() {
    poops.forEach(p => p.y += p.vy);
    poops = poops.filter(p => p.y < 640);
  }
    
  function updateJumper(enemy) {
    // 横移動
    enemy.x -= enemy.speed;
  
    // ★ 着地判定
    const onGround = (enemy.y >= GROUND_BOTTOM - enemy.h - 0.1);
  
    // ★ 着地している時だけ距離カウント
    if (onGround) {
      enemy.jumpDistance = (enemy.jumpDistance || 0) + enemy.speed;
  
      // ★ 着地後20px進んだらジャンプ
      if (enemy.jumpDistance >= 20) {
        enemy.jumpDistance = 0;
        enemy.vy = -8;   // ★ ジャンプ力を半分（-16 → -8）
      }
    }
  
    // ★ Jumper 専用の重力（通常の半分）
    const jumperGravity = gravity * 0.5;
  
    // 重力
    enemy.vy += jumperGravity;
    enemy.y += enemy.vy;
  
    // ★ 地面に着地
    if (enemy.y > GROUND_BOTTOM - enemy.h) {
      enemy.y = GROUND_BOTTOM - enemy.h;
      enemy.vy = 0;
    }
  
    // ★ 上に飛びすぎて画面外に行かないように上限
    const maxJumpHeight = GROUND_BOTTOM - enemy.h - 180; // Tall の3倍
    if (enemy.y < maxJumpHeight) {
      enemy.y = maxJumpHeight;
      enemy.vy = 0;
    }
  }

  function updateEnemies() {
    enemies.forEach(e => {
  
      if (e.type === "jumper") {
        updateJumper(e);
        return;
      }
  
      if (e.type === "flyer") {
        updateFlyer(e);
        return;
      }
  
      // normal / tall
      e.x -= e.speed;
    });
  
    enemies = enemies.filter(e =>
      e.x + e.w > 0 &&
      e.y + e.h > 0 &&
      e.y < 640
    );
  }


  function isColliding(a, b) {
    return (
      a.x < b.x + b.w &&
      a.x + a.w > b.x &&
      a.y < b.y + b.h &&
      a.y + a.h > b.y
    );
  }

  function update() {
    if (gameOver) return;

    updateDifficulty();

    if (keys["ArrowLeft"]) player.x -= 4;
    if (keys["ArrowRight"]) player.x += 4;
    // ★ 自機の画面外移動を禁止
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > 360) player.x = 360 - player.w;
    
    player.vy += gravity;
    player.y += player.vy;

    if (player.y >= GROUND_BOTTOM - player.h) {
      player.y = GROUND_BOTTOM - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumpCount = 0;
    }

    garbage.forEach(g => g.x -= 4);
    garbage = garbage.filter(g => g.x > -50);

    updateEnemies();
    updatePoops();

    garbage.forEach((g, i) => {
      if (isColliding(player, g)) {
        score += g.score;
        garbage.splice(i, 1);
      }
    });

    enemies.forEach(e => {
      if (isColliding(player, e)) endGame();
    });

    poops.forEach(p => {
      if (isColliding(player, p)) endGame();
    });

    score += 0.1;

    draw();
    requestAnimationFrame(update);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "blue";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    garbage.forEach(g => {
      ctx.fillStyle = g.color;
      ctx.fillRect(g.x, g.y, g.w, g.h);
    });

    enemies.forEach(e => {
      ctx.fillStyle = "red";
      ctx.fillRect(e.x, e.y, e.w, e.h);
    });

    ctx.fillStyle = "brown";
    poops.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + Math.floor(score), 10, 30);
    ctx.fillText("Lv: " + difficulty, 280, 30);

    ctx.font = "14px Arial";
    ctx.fillText("Trash Picker " + VERSION, 10, 60);
  }

  async function endGame() {
    if (gameOver) return;
    gameOver = true;
    // ★ タイマーを止める
    if (enemySpawnTimerId !== null) {
      clearTimeout(enemySpawnTimerId);
      enemySpawnTimerId = null;
    }
    if (garbageSpawnTimerId !== null) {
      clearTimeout(garbageSpawnTimerId);
      garbageSpawnTimerId = null;
    }

    const finalScore = Math.floor(score);
    const playerName = nameInput.value.trim() || "名無し";

    try {
      window.parent.postMessage({ type: "GAME_OVER" }, "*");
    } catch (e) {
      console.log("postMessage error:", e);
    }

    (async () => {
      try {
        await saveScoreToFirebase(finalScore, playerName);
        await cleanupTop10();
      } catch (e) {
        console.log("Firebase error:", e);
      }
    })();

    replayButton.style.display = "flex";
  }
</script>

</body>
</html>
