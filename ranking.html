<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ranking</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f0f0;
        margin: 0;
        padding: 20px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      #rankingTable {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        border-collapse: collapse;
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
      }

      #rankingTable th, #rankingTable td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      #rankingTable th {
        background: #333;
        color: #fff;
      }

      tr:nth-child(even) {
        background: #f9f9f9;
      }

      #loading {
        text-align: center;
        margin-top: 20px;
        font-size: 18px;
      }
    </style>

    <!-- Firebase v8（Wix iframe で動く） -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
      // ★ 健の Firebase 設定
      var firebaseConfig = {
        apiKey: "AIzaSyDKUEGCdlnIIS_1nmMpEzqZ3bc9icLd2aE",
        authDomain: "wix-game-score.firebaseapp.com",
        projectId: "wix-game-score",
        storageBucket: "wix-game-score.firebasestorage.app",
        messagingSenderId: "207767590781",
        appId: "1:207767590781:web:8e435affd2a4d82f4b9e14"
      };

      // Firebase 初期化
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // ★ ランキング読み込み
      async function loadRanking() {
        const tableBody = document.getElementById("rankingBody");
        const loading = document.getElementById("loading");

        loading.textContent = "読み込み中…";

        try {
          const snapshot = await db
            .collection("scores")
            .orderBy("score", "desc")
            .limit(50)
            .get();

          loading.style.display = "none";

          let rank = 1;

          snapshot.forEach(doc => {
            const data = doc.data();

            const row = document.createElement("tr");

            row.innerHTML = `
              <td>${rank}</td>
              <td>${data.name}</td>
              <td>${data.score}</td>
            `;

            tableBody.appendChild(row);
            rank++;
          });

          if (rank === 1) {
            loading.textContent = "まだスコアがありません。";
            loading.style.display = "block";
          }

        } catch (e) {
          console.error("ランキング読み込み失敗:", e);
          loading.textContent = "読み込みに失敗しました。";
        }
      }

      window.onload = loadRanking;
    </script>

  </head>

  <body>

    <h1>ランキング</h1>

    <table id="rankingTable">
      <thead>
        <tr>
          <th>順位</th>
          <th>名前</th>
          <th>スコア</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>

    <div id="loading">読み込み中…</div>

  </body>
</html>
