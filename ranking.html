<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ranking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 10px;                 /* スマホ向けに余白を縮小 */
      display: flex;
      justify-content: center;
    }
  
    /* ★ ランキング全体を 360px に統一 */
    #rankingWrapper {
      width: 100%;
      max-width: 360px;              /* ★ ゲーム画面と同じ幅 */
      margin: 0 auto;
    }
  
    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 22px;               /* スマホ向けに最適化 */
    }
  
    /* ★ テーブルも 360px 内に収まるように */
    #rankingTable {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      font-size: 15px;               /* スマホ向けに調整 */
    }
  
    #rankingTable th, #rankingTable td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
      word-break: break-word;        /* 長い名前でもはみ出さない */
    }
  
    #rankingTable th {
      background: #333;
      color: #fff;
      font-size: 16px;
    }
  
    tr:nth-child(even) {
      background: #f9f9f9;
    }
  
    #loading {
      text-align: center;
      margin-top: 20px;
      font-size: 16px;
    }
  
    /* ★ 削除ボタンもスマホ向けに */
    .deleteBtn {
      background: #d9534f;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
  
    .deleteBtn:hover {
      background: #c9302c;
    }
  
    #adminKeyInput {
      width: 80%;
      max-width: 250px;
      padding: 8px;
      margin-bottom: 10px;
      text-align: center;
      font-size: 15px;
    }
  
    /* ★ スマホ最適化 */
    @media (max-width: 400px) {
      #rankingTable th, #rankingTable td {
        padding: 8px;
        font-size: 14px;
      }
      h1 {
        font-size: 20px;
      }
    } 
</style>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDKUEGCdlnIIS_1nmMpEzqZ3bc9icLd2aE",
      authDomain: "wix-game-score.firebaseapp.com",
      projectId: "wix-game-score",
      storageBucket: "wix-game-score.firebasestorage.app",
      messagingSenderId: "207767590781",
      appId: "1:207767590781:web:8e435affd2a4d82f4b9e14"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let adminMode = false;

    function toggleAdminMode() {
      const keyInput = document.getElementById("adminKeyInput");
      const btn = document.getElementById("adminToggleBtn");

      if (!adminMode) {
        if (keyInput.value === "fujimino2025") {
          adminMode = true;
          btn.textContent = "管理者モード OFF";
          loadRanking();
        } else {
          alert("管理者キーが違います");
        }
        return;
      }

      adminMode = false;
      btn.textContent = "管理者モード ON";
      loadRanking();
    }

    function loadRanking() {
      const tableBody = document.getElementById("rankingBody");
      const loading = document.getElementById("loading");

      loading.textContent = "読み込み中…";

      db.collection("scores")
        .orderBy("score", "desc")
        .limit(50)  // 一旦多めに取得
        .onSnapshot((snapshot) => {
          tableBody.innerHTML = "";
          loading.style.display = "none";

          let items = [];

          snapshot.forEach(doc => {
            const data = doc.data();
            items.push({
              id: doc.id,
              name: data.name || "",
              score: data.score,
              date: data.date ? data.date.toDate() : null
            });
          });

          /* ★ 健さん仕様の並び替えロジック */
          items.sort((a, b) => {
            // ① スコア降順
            if (b.score !== a.score) return b.score - a.score;

            // ② 空欄の名前は最後へ
            if (a.name.trim() === "" && b.name.trim() !== "") return 1;
            if (b.name.trim() === "" && a.name.trim() !== "") return -1;

            // ③ 大文字小文字を無視して名前昇順
            return a.name.toLowerCase().localeCompare(b.name.toLowerCase(), "ja");
          });

          // ★ トップ10だけに絞る
          items = items.slice(0, 10);

          // ★ 表示
          let rank = 1;
          items.forEach(item => {
            const dateStr = item.date
              ? item.date.toLocaleString("ja-JP")
              : "-";

            const row = document.createElement("tr");

            row.innerHTML = `
              <td>${rank}</td>
              <td>${item.name}</td>
              <td>${item.score}</td>
              <td>${dateStr}</td>
              <td>
                ${adminMode ? `<button class="deleteBtn" onclick="deleteScore('${item.id}')">削除</button>` : ""}
              </td>
            `;

            tableBody.appendChild(row);
            rank++;
          });

          if (rank === 1) {
            loading.textContent = "まだスコアがありません。";
            loading.style.display = "block";
          }
        });
    }

    async function deleteScore(id) {
      await db.collection("scores").doc(id).delete();
    }

    window.onload = loadRanking;
  </script>

</head>

<body>

  <h1>ランキング</h1>

  <div style="text-align:center; margin-bottom:15px;">
    <input id="adminKeyInput" placeholder="管理者キー" />
    <button id="adminToggleBtn" onclick="toggleAdminMode()">管理者モード ON</button>
  </div>

  <table id="rankingTable">
    <thead>
      <tr>
        <th>順位</th>
        <th>名前</th>
        <th>スコア</th>
        <th>日付</th>
        <th>管理</th>
      </tr>
    </thead>
    <tbody id="rankingBody"></tbody>
  </table>

  <div id="loading">読み込み中…</div>

</body>
</html>
